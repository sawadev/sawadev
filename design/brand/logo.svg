<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="sawadev">
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#7C5CF6" stop-opacity="0.55" />
      <stop offset="70%" stop-color="#7C5CF6" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="diamond" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9B82FF" />
      <stop offset="100%" stop-color="#6B4AE8" />
    </linearGradient>
  </defs>
  <!-- tuile sombre (équivalent favicon) -->
  <rect width="512" height="512" rx="112" fill="#0E0E11" />
  <!-- halo violet -->
  <rect width="512" height="512" rx="112" fill="url(#glow)" />
  <!-- losange de la marque -->
  <rect x="156" y="156" width="200" height="200" rx="40" fill="url(#diamond)" transform="rotate(45 256 256)" />
</svg>
