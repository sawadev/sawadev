name: Release images

# Build & push des images multi-arch vers GHCR sur tag semver (vX.Y.Z),
# + un smoke test de l'image orchestrateur.

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Prod = VPS x86 -> amd64 suffit pour orchestrateur et Caddy
          # (évite l'émulation arm64, très lente pour le build Go de Caddy).
          - name: orchestrator
            context: .
            dockerfile: images/orchestrator/Dockerfile
            platforms: linux/amd64
          - name: caddy
            context: images/caddy
            dockerfile: images/caddy/Dockerfile
            platforms: linux/amd64
          # Workspace : multi-arch (dev Mac Apple Silicon + VPS x86).
          - name: workspace
            context: images/workspace
            dockerfile: images/workspace/Dockerfile
            platforms: linux/amd64,linux/arm64
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build orchestrator (single-arch, local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/orchestrator/Dockerfile
          load: true
          tags: sawadev/orchestrator:ci
      - name: Run & ping health
        run: |
          docker run -d --name orch -p 8787:8787 sawadev/orchestrator:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8787/api/health; then echo "ok"; exit 0; fi
            sleep 2
          done
          echo "health-check failed"; docker logs orch; exit 1
